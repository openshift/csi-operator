updates:
  - file: "stable/smb-csi-driver-operator.clusterserviceversion.yaml" # relative to this file
    update_list:
    # replace metadata.name value
    - search: "smb-csi-driver-operator.v4.18.0"
      replace: "smb-csi-driver-operator.v4.18.0-{DATE_TIME}"
    # replace entire version line, otherwise would replace 4.3.0 anywhere
    - search: "version: 4.18.0"
      replace: "version: 4.18.0-{DATE_TIME}"
    - search: 'olm.skipRange: ">=4.16.0-0 <4.18.0"'
      replace: 'olm.skipRange: ">=4.16.0-0 <4.18.0-{DATE_TIME}"'
    # Update links in the CSV description to exact OCP version
    - search: 'https://docs.openshift.com/container-platform/latest/'
      replace: 'https://docs.openshift.com/container-platform/4.18/'
  - file: "smb-csi-driver-operator.package.yaml"
    update_list:
    - search: "currentCSV: smb-csi-driver-operator.v4.18.0"
      replace: "currentCSV: smb-csi-driver-operator.4.18.0-{DATE_TIME}"
