kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: gcp-pd-hostnetwork-role
rules:
  - apiGroups: ["security.openshift.io"]
    resourceNames: ["hostnetwork-v2"]
    resources: ["securitycontextconstraints"]
    verbs: ["use"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get"]
